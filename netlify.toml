[build]
  command = "echo 'skip'"
  publish = "build"

[build.environment]
  NODE_VERSION = "24"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/static/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
